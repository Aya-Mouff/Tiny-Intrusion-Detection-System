<!-- ===== web/templates/dashboard.html (TEMPLATE) ===== -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tIDS Dashboard - Network Security Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-left h1 {
            color: #1e3c72;
            margin: 0;
            font-size: 28px;
        }
        
        .header-left p {
            color: #666;
            margin: 5px 0 0 0;
            font-size: 14px;
        }
        
        .header-right {
            text-align: right;
        }
        
        .server-status {
            display: inline-block;
            background: #4caf50;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .server-status.offline {
            background: #f44336;
        }
        
        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .card h2 {
            color: #1e3c72;
            margin-bottom: 20px;
            font-size: 18px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }
        
        /* Status Display Card */
        .status-card {
            grid-column: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .prediction-display {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 32px;
            font-weight: bold;
            transition: all 0.3s ease;
            animation: fadeIn 0.3s ease;
        }
        
        .prediction-display.safe {
            background: #c8e6c9;
            color: #2e7d32;
            border-left: 5px solid #4caf50;
        }
        
        .prediction-display.attack {
            background: #ffcdd2;
            color: #c62828;
            border-left: 5px solid #f44336;
            animation: pulse 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .confidence {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
        
        .confidence-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .confidence-fill {
            height: 100%;
            background: #4caf50;
            transition: width 0.3s ease;
        }
        
        /* Stats Card */
        .stats-card {
            grid-column: 2;
            display: grid;
            grid-template-rows: auto auto auto auto;
            gap: 15px;
        }
        
        .stat {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #2196f3;
        }
        
        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #1e3c72;
            margin-top: 5px;
        }
        
        .stat.attack-stat {
            border-left-color: #f44336;
        }
        
        .stat.safe-stat {
            border-left-color: #4caf50;
        }
        
        /* Predictions History */
        .history-card {
            grid-column: 1 / -1;
        }
        
        .predictions-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }
        
        .prediction-item:hover {
            background: #f5f5f5;
        }
        
        .prediction-item:last-child {
            border-bottom: none;
        }
        
        .prediction-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 12px;
        }
        
        .badge-normal {
            background: #c8e6c9;
            color: #2e7d32;
        }
        
        .badge-attack {
            background: #ffcdd2;
            color: #c62828;
        }
        
        .prediction-time {
            color: #999;
            font-size: 12px;
        }
        
        .prediction-confidence {
            color: #666;
            font-size: 12px;
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-state p {
            margin: 10px 0;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr;
            }
            
            .stats-card {
                grid-column: 1;
            }
            
            .history-card {
                grid-column: 1;
            }
            
            header {
                flex-direction: column;
                text-align: center;
            }
            
            .header-right {
                margin-top: 15px;
            }
        }
        
        /* Connection indicator */
        .connection-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            animation: blink 1s infinite;
            margin-right: 5px;
        }
        
        .connection-indicator.disconnected {
            background: #f44336;
            animation: none;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-left">
                <h1>🛡️ tIDS Dashboard</h1>
                <p>Traffic Intrusion Detection System</p>
            </div>
            <div class="header-right">
                <div class="server-status" id="serverStatus">
                    <span class="connection-indicator" id="connectionIndicator"></span>
                    <span id="statusText">Connecting...</span>
                </div>
            </div>
        </header>
        
        <!-- Main Content -->
        <main>
            <!-- Status Card -->
            <div class="card status-card">
                <h2>Current Status</h2>
                
                <div id="predictionDisplay" class="prediction-display safe">
                    <span id="predictionText">Waiting...</span>
                </div>
                
                <div class="confidence">
                    <strong>Confidence:</strong>
                    <div class="confidence-bar">
                        <div class="confidence-fill" id="confidenceFill" style="width: 0%"></div>
                    </div>
                    <span id="confidenceText">--</span>
                </div>
                
                <div style="margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 5px; font-size: 12px; color: #666;">
                    <strong>Last Update:</strong> <span id="lastUpdate">Never</span>
                </div>
            </div>
            
            <!-- Statistics Card -->
            <div class="card stats-card">
                <h2>Statistics</h2>
                
                <div class="stat safe-stat">
                    <div class="stat-label">Safe Traffic</div>
                    <div class="stat-value" id="safeCount">0</div>
                </div>
                
                <div class="stat attack-stat">
                    <div class="stat-label">Attacks Detected</div>
                    <div class="stat-value" id="attackCount">0</div>
                </div>
                
                <div class="stat">
                    <div class="stat-label">Total Predictions</div>
                    <div class="stat-value" id="totalCount">0</div>
                </div>
                
                <div class="stat">
                    <div class="stat-label">Attack Rate</div>
                    <div class="stat-value" id="attackRate">0%</div>
                </div>
            </div>
            
            <!-- History Card -->
            <div class="card history-card">
                <h2>Prediction History</h2>
                <div class="predictions-list" id="predictionsList">
                    <div class="empty-state">
                        <p>📊 No predictions yet</p>
                        <p>Waiting for network traffic analysis...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // Configuration
        const WS_URL = `ws://${window.location.host}/ws/predictions`;
        const API_URL = `http://${window.location.host}/api`;
        
        // State
        let predictions = [];
        let ws = null;
        let isConnected = false;
        
        // Initialize
        function init() {
            console.log("Initializing tIDS Dashboard...");
            connectWebSocket();
            fetchStats();
            // Refresh stats every 5 seconds
            setInterval(fetchStats, 5000);
        }
        
        // Connect to WebSocket
        function connectWebSocket() {
            console.log(`Connecting to WebSocket: ${WS_URL}`);
            
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => {
                console.log("✓ WebSocket connected");
                isConnected = true;
                updateConnectionStatus(true);
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    console.log("Received prediction:", data);
                    handlePrediction(data);
                } catch (e) {
                    console.error("Error parsing message:", e);
                }
            };
            
            ws.onerror = (error) => {
                console.error("WebSocket error:", error);
                isConnected = false;
                updateConnectionStatus(false);
            };
            
            ws.onclose = () => {
                console.log("WebSocket disconnected");
                isConnected = false;
                updateConnectionStatus(false);
                // Try to reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };
        }
        
        // Handle incoming prediction
        function handlePrediction(data) {
            if (!data.success) {
                console.error("Prediction failed:", data.error);
                return;
            }
            
            // Update main display
            updatePredictionDisplay(data);
            
            // Add to history
            addToHistory(data);
            
            // Update stats
            fetchStats();
        }
        
        // Update main prediction display
        function updatePredictionDisplay(data) {
            const display = document.getElementById('predictionDisplay');
            const text = document.getElementById('predictionText');
            const confidence = document.getElementById('confidenceFill');
            const confidenceText = document.getElementById('confidenceText');
            const lastUpdate = document.getElementById('lastUpdate');
            
            // Determine if safe or attack
            const isSafe = data.prediction && 
                          (data.prediction.toLowerCase() === 'normal' || 
                           data.prediction.toLowerCase() === 'benign');
            
            // Update display
            display.className = `prediction-display ${isSafe ? 'safe' : 'attack'}`;
            text.textContent = isSafe ? '✅ SAFE' : '🚨 ATTACK DETECTED';
            
            // Update confidence bar
            const confidencePercent = (data.confidence || 0) * 100;
            confidence.style.width = confidencePercent + '%';
            confidenceText.textContent = `${confidencePercent.toFixed(1)}%`;
            
            // Update timestamp
            const time = new Date(data.timestamp);
            lastUpdate.textContent = time.toLocaleTimeString();
        }
        
        // Add prediction to history
        function addToHistory(data) {
            const list = document.getElementById('predictionsList');
            
            // Clear empty state
            if (list.innerHTML.includes('empty-state')) {
                list.innerHTML = '';
            }
            
            // Create item
            const isSafe = data.prediction && 
                          (data.prediction.toLowerCase() === 'normal' || 
                           data.prediction.toLowerCase() === 'benign');
            
            const item = document.createElement('div');
            item.className = 'prediction-item';
            
            const time = new Date(data.timestamp);
            
            item.innerHTML = `
                <div>
                    <span class="prediction-badge ${isSafe ? 'badge-normal' : 'badge-attack'}">
                        ${data.prediction || 'Unknown'}
                    </span>
                    <span class="prediction-time">${time.toLocaleTimeString()}</span>
                </div>
                <div>
                    <span class="prediction-confidence">${((data.confidence || 0) * 100).toFixed(1)}%</span>
                </div>
            `;
            
            // Add to top
            list.insertBefore(item, list.firstChild);
            
            // Keep only last 20 items
            while (list.children.length > 20) {
                list.removeChild(list.lastChild);
            }
        }
        
        // Fetch and display statistics
        async function fetchStats() {
            try {
                const response = await fetch(`${API_URL}/predictions/stats`);
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('safeCount').textContent = data.normal || 0;
                    document.getElementById('attackCount').textContent = data.attacks || 0;
                    document.getElementById('totalCount').textContent = data.total || 0;
                    document.getElementById('attackRate').textContent = data.attack_rate || '0%';
                }
            } catch (e) {
                console.error("Error fetching stats:", e);
            }
        }
        
        // Update connection status indicator
        function updateConnectionStatus(connected) {
            const status = document.getElementById('serverStatus');
            const indicator = document.getElementById('connectionIndicator');
            const statusText = document.getElementById('statusText');
            
            if (connected) {
                status.className = 'server-status';
                indicator.className = 'connection-indicator';
                statusText.textContent = 'Connected';
            } else {
                status.className = 'server-status offline';
                indicator.className = 'connection-indicator disconnected';
                statusText.textContent = 'Disconnected';
            }
        }
        
        // Start when page loads
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
